---
openapi: 3.1.0
info:
  title: Media Management Service API
  description: |
    Media management microservice for the Recipe Web Application ecosystem.

    Handles file uploads, content-addressable storage, and retrieval with
    signed download URLs for browser-safe rendering.
  version: 0.2.0
  contact:
    name: Recipe Web App Team
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api/v1/media-management
    description: Local development server
  - url: http://sous-chef-proxy.local/api/v1/media-management
    description: Kubernetes deployment

tags:
  - name: health
    description: Health and readiness checks
  - name: media
    description: Media file operations

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      description: |
        Kubernetes liveness probe endpoint.

        Status levels:
        - **healthy**: All dependencies operational
        - **degraded**: At least one dependency working
        - **unhealthy**: All critical dependencies failing
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy or degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: All dependencies healthy
                  value:
                    status: "healthy"
                    timestamp: "2025-01-15T10:30:00Z"
                    service: "media-management-service"
                    version: "0.2.0"
                    response_time_ms: 25
                    checks:
                      database:
                        status: "healthy"
                        response_time_ms: 5
                      storage:
                        status: "healthy"
                        response_time_ms: 3
                      overall: "healthy"
                degraded:
                  summary: Some dependencies failing
                  value:
                    status: "degraded"
                    timestamp: "2025-01-15T10:30:00Z"
                    service: "media-management-service"
                    version: "0.2.0"
                    response_time_ms: 2050
                    checks:
                      database:
                        status: "unhealthy"
                        response_time_ms: 2000
                      storage:
                        status: "healthy"
                        response_time_ms: 3
                      overall: "degraded"
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "unhealthy"
                timestamp: "2025-01-15T10:30:00Z"
                service: "media-management-service"
                version: "0.2.0"
                response_time_ms: 4010
                checks:
                  database:
                    status: "timeout"
                    response_time_ms: 2000
                  storage:
                    status: "unhealthy"
                    response_time_ms: 2000
                  overall: "unhealthy"

  /ready:
    get:
      tags: [health]
      summary: Readiness check
      description: |
        Kubernetes readiness probe endpoint. Binary ready/not-ready status.

        - **ready**: ALL dependencies operational
        - **not_ready**: ANY dependency failed
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: "ready"
                timestamp: "2025-01-15T10:30:00Z"
                service: "media-management-service"
                version: "0.2.0"
                response_time_ms: 25
                checks:
                  database:
                    status: "ready"
                    response_time_ms: 5
                  storage:
                    status: "ready"
                    response_time_ms: 3
                  overall: "ready"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: "not_ready"
                timestamp: "2025-01-15T10:30:00Z"
                service: "media-management-service"
                version: "0.2.0"
                response_time_ms: 2010
                checks:
                  database:
                    status: "timeout"
                    response_time_ms: 2000
                  storage:
                    status: "ready"
                    response_time_ms: 3
                  overall: "not_ready"

  /media:
    post:
      tags: [media]
      summary: Upload media file
      description: |
        Upload a media file with automatic content-addressable storage and deduplication.
      operationId: uploadMedia
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file to upload
                filename:
                  type: string
                  description: Original filename
                  example: "example.jpg"
              required:
                - file
                - filename
      responses:
        "200":
          description: Media uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDto"
        "400":
          description: Bad request - invalid file or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [media]
      summary: List media files
      description: |
        Retrieve media files with cursor-based pagination and optional filtering.
        Returns only media owned by the authenticated user unless admin scoped.
      operationId: listMedia
      parameters:
        - name: cursor
          in: query
          description: Base64-encoded cursor for pagination
          schema:
            type: string
            example: "eyJpZCI6MTI0fQ=="
        - name: limit
          in: query
          description: Maximum number of items to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: status
          in: query
          description: Filter by processing status
          schema:
            type: string
            enum: [pending, processing, complete, failed]
        - name: uploaded_by
          in: query
          description: Filter by user ID (defaults to authenticated user)
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of media files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMediaResponse"
              example:
                data:
                  - id: 123
                    content_hash: "abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"
                    original_filename: "example-image.jpg"
                    media_type: "image/jpeg"
                    file_size: 1048576
                    processing_status: "complete"
                    uploaded_by: "user-abc-123"
                    uploaded_at: "2025-01-15T10:30:00Z"
                    updated_at: "2025-01-15T10:30:00Z"
                    download_url: "/media/123/download?signature=abc123&expires=1709510400"
                pagination:
                  next_cursor: "eyJpZCI6MTI0fQ=="
                  prev_cursor: null
                  page_size: 1
                  has_next: true
                  has_prev: false
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /media/{id}:
    get:
      tags: [media]
      summary: Get media by ID
      description: |
        Retrieve metadata for a specific media file, including a signed download URL.
      operationId: getMediaById
      parameters:
        - $ref: "#/components/parameters/MediaId"
      responses:
        "200":
          description: Media information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDto"
              example:
                id: 123
                content_hash: "abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"
                original_filename: "example.jpg"
                media_type: "image/jpeg"
                file_size: 1048576
                processing_status: "complete"
                uploaded_by: "user-abc-123"
                uploaded_at: "2025-01-15T10:30:00Z"
                updated_at: "2025-01-15T10:30:00Z"
                download_url: "/media/123/download?signature=abc123&expires=1709510400"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [media]
      summary: Delete media file
      description: |
        Permanently delete a media file and its database record. Irreversible.
      operationId: deleteMedia
      parameters:
        - $ref: "#/components/parameters/MediaId"
      responses:
        "204":
          description: Media file successfully deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /media/{id}/download:
    get:
      tags: [media]
      summary: Download media file
      description: |
        Download the media file binary. Supports two auth modes:

        - **Bearer token**: Standard API authentication via header
        - **Signed URL**: Query params `signature` + `expires` for browser rendering

        Responses include aggressive cache headers since content-addressable
        storage guarantees immutability (same hash = same content forever).
      operationId: downloadMedia
      parameters:
        - $ref: "#/components/parameters/MediaId"
        - name: signature
          in: query
          description: HMAC-SHA256 signature for signed URL access
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
        - name: expires
          in: query
          description: Unix timestamp for URL expiration
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
        - SignedUrl: []
      responses:
        "200":
          description: Media file binary data
          headers:
            Content-Disposition:
              description: Attachment with original filename
              schema:
                type: string
                example: 'attachment; filename="example.jpg"'
            Content-Length:
              description: File size in bytes
              schema:
                type: integer
            Cache-Control:
              description: Aggressive caching for immutable content
              schema:
                type: string
                example: "public, max-age=31536000, immutable"
            ETag:
              description: Content hash as entity tag
              schema:
                type: string
                example: '"abcdef1234567890..."'
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
            audio/mpeg:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid authentication (no Bearer token and no valid signature)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /media/upload-request:
    post:
      tags: [media]
      summary: Initiate presigned upload
      description: |
        Creates a presigned upload session for UI-friendly file uploads.

        - HMAC-SHA256 signed URLs
        - 15-minute expiration
        - File size and content type validation
        - Dangerous file extension filtering
      operationId: initiateUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateUploadRequest"
            example:
              filename: "example.jpg"
              content_type: "image/jpeg"
              file_size: 1048576
      responses:
        "200":
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateUploadResponse"
              example:
                media_id: 123
                upload_url: "/media/upload/upload_abc123?signature=def456&expires=1704067200&size=1048576&type=image%2Fjpeg"
                upload_token: "upload_aBcDeFgHiJkLmNoPqRsTuVwXyZ012345"
                expires_at: "2024-01-01T12:00:00Z"
        "400":
          description: Invalid request (file too large, dangerous extension, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                file_too_large:
                  summary: File size exceeds limit
                  value:
                    error: "bad_request"
                    message: "File size 52428800 bytes exceeds maximum allowed size of 50000000 bytes"
                dangerous_extension:
                  summary: Dangerous file extension
                  value:
                    error: "bad_request"
                    message: "File type not allowed: malware.exe"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /media/upload/{token}:
    put:
      tags: [media]
      summary: Upload file via presigned URL
      description: |
        Upload file content using the presigned URL from upload initiation.

        Validates HMAC signature, expiration, file size, and content type.
      operationId: uploadFile
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            pattern: "^upload_[a-zA-Z0-9]{32}$"
        - name: signature
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: type
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaDto"
        "400":
          description: Invalid signature, expired URL, or file size mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                expired_url:
                  summary: Upload URL has expired
                  value:
                    error: "bad_request"
                    message: "Upload URL has expired"
                size_mismatch:
                  summary: File size mismatch
                  value:
                    error: "bad_request"
                    message: "File size mismatch: expected 1048576 bytes, got 1024000 bytes"
        "401":
          description: Invalid or expired signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/{id}/status:
    get:
      tags: [media]
      summary: Get processing status
      description: |
        Check the processing status of a media upload.
      operationId: getUploadStatus
      parameters:
        - $ref: "#/components/parameters/MediaId"
      responses:
        "200":
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadStatusResponse"
              examples:
                pending:
                  summary: Awaiting file upload
                  value:
                    media_id: 123
                    status: "pending"
                    download_url: null
                    uploaded_at: null
                    completed_at: null
                complete:
                  summary: Processing finished
                  value:
                    media_id: 123
                    status: "complete"
                    download_url: "/media/123/download?signature=abc123&expires=1709510400"
                    uploaded_at: "2024-01-01T12:00:00Z"
                    completed_at: "2024-01-01T12:00:02Z"
                failed:
                  summary: Processing failed
                  value:
                    media_id: 123
                    status: "failed"
                    error_message: "Corrupted file header detected"
                    download_url: null
                    uploaded_at: "2024-01-01T12:00:00Z"
                    completed_at: "2024-01-01T12:00:01Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /media/recipe/{recipe_id}:
    get:
      tags: [media]
      summary: Get media for a recipe
      description: |
        Retrieve media associated with a recipe.
      operationId: getMediaByRecipe
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Media for the recipe
          content:
            application/json:
              schema:
                type: object
                required:
                  - media_ids
                properties:
                  media_ids:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaId"
              example:
                media_ids: [1, 2, 3]
        "400":
          description: Invalid recipe ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /media/recipe/{recipe_id}/ingredient/{ingredient_id}:
    get:
      tags: [media]
      summary: Get media for a recipe ingredient
      description: |
        Retrieve media associated with a specific ingredient in a recipe.
      operationId: getMediaByIngredient
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: ingredient_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Media for the ingredient
          content:
            application/json:
              schema:
                type: object
                required:
                  - media_ids
                properties:
                  media_ids:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaId"
              example:
                media_ids: [4, 5]
        "400":
          description: Invalid recipe or ingredient ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /media/recipe/{recipe_id}/step/{step_id}:
    get:
      tags: [media]
      summary: Get media for a recipe step
      description: |
        Retrieve media associated with a specific step in a recipe.
      operationId: getMediaByStep
      parameters:
        - name: recipe_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: step_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Media for the step
          content:
            application/json:
              schema:
                type: object
                required:
                  - media_ids
                properties:
                  media_ids:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaId"
              example:
                media_ids: [6, 7, 8]
        "400":
          description: Invalid recipe or step ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  schemas:
    MediaId:
      type: integer
      format: int64
      description: Unique media file identifier (database BIGSERIAL)
      example: 123

    HealthResponse:
      type: object
      required: [status, timestamp, service, version, response_time_ms, checks]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: "media-management-service"
        version:
          type: string
          example: "0.2.0"
        response_time_ms:
          type: integer
          minimum: 0
        checks:
          type: object
          required: [database, storage, overall]
          properties:
            database:
              $ref: "#/components/schemas/DependencyCheck"
            storage:
              $ref: "#/components/schemas/DependencyCheck"
            overall:
              type: string
              enum: [healthy, degraded, unhealthy]

    ReadinessResponse:
      type: object
      required: [status, timestamp, service, version, response_time_ms, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: "media-management-service"
        version:
          type: string
          example: "0.2.0"
        response_time_ms:
          type: integer
          minimum: 0
        checks:
          type: object
          required: [database, storage, overall]
          properties:
            database:
              $ref: "#/components/schemas/ReadinessDependencyCheck"
            storage:
              $ref: "#/components/schemas/ReadinessDependencyCheck"
            overall:
              type: string
              enum: [ready, not_ready]

    MediaDto:
      type: object
      required:
        - id
        - content_hash
        - original_filename
        - media_type
        - file_size
        - processing_status
        - uploaded_by
        - uploaded_at
        - updated_at
        - download_url
      properties:
        id:
          $ref: "#/components/schemas/MediaId"
        content_hash:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: SHA-256 hash of the file content
        original_filename:
          type: string
          description: Original filename as uploaded
          example: "example.jpg"
        media_type:
          type: string
          description: MIME type
          example: "image/jpeg"
        file_size:
          type: integer
          format: int64
          minimum: 0
          description: File size in bytes
          example: 1048576
        processing_status:
          $ref: "#/components/schemas/ProcessingStatus"
        uploaded_by:
          type: string
          description: User ID of the uploader
          example: "user-abc-123"
        uploaded_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        download_url:
          type: string
          nullable: true
          description: Signed download URL (null if processing not complete)
          example: "/media/123/download?signature=abc123&expires=1709510400"

    PaginatedMediaResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MediaDto"
        pagination:
          $ref: "#/components/schemas/PaginationInfo"

    PaginationInfo:
      type: object
      required: [page_size, has_next, has_prev]
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Base64-encoded cursor for next page
        prev_cursor:
          type: string
          nullable: true
          description: Cursor for previous page
        page_size:
          type: integer
          minimum: 0
        has_next:
          type: boolean
        has_prev:
          type: boolean

    ProcessingStatus:
      type: string
      enum: [pending, processing, complete, failed]
      description: Media processing status

    InitiateUploadRequest:
      type: object
      required: [filename, content_type, file_size]
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 255
          example: "example.jpg"
        content_type:
          type: string
          description: MIME content type
          example: "image/jpeg"
        file_size:
          type: integer
          format: int64
          minimum: 1
          maximum: 52428800
          description: File size in bytes (max 50MB default)

    InitiateUploadResponse:
      type: object
      required: [media_id, upload_url, upload_token, expires_at]
      properties:
        media_id:
          $ref: "#/components/schemas/MediaId"
        upload_url:
          type: string
          description: Presigned URL for file upload
        upload_token:
          type: string
          pattern: "^upload_[a-zA-Z0-9]{32}$"
        expires_at:
          type: string
          format: date-time

    UploadStatusResponse:
      type: object
      required: [media_id, status]
      properties:
        media_id:
          $ref: "#/components/schemas/MediaId"
        status:
          $ref: "#/components/schemas/ProcessingStatus"
        error_message:
          type: string
          nullable: true
          description: Error description if status is failed
        download_url:
          type: string
          nullable: true
          description: Signed download URL when processing complete
        uploaded_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Error type identifier
          example: "not_found"
        message:
          type: string
          description: Human-readable error description

    DependencyCheck:
      type: object
      required: [status, response_time_ms]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, timeout]
        response_time_ms:
          type: integer
          minimum: 0

    ReadinessDependencyCheck:
      type: object
      required: [status, response_time_ms]
      properties:
        status:
          type: string
          enum: [ready, not_ready, timeout]
        response_time_ms:
          type: integer
          minimum: 0

  parameters:
    MediaId:
      name: id
      in: path
      description: Unique media file identifier
      required: true
      schema:
        $ref: "#/components/schemas/MediaId"

  responses:
    Unauthorized:
      description: Invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "unauthorized"
            message: "Invalid or missing authentication token"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "not_found"
            message: "The requested resource was not found"

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "internal_error"
            message: "An unexpected error occurred"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OAuth2/JWT token authentication via Authorization header.
    SignedUrl:
      type: apiKey
      in: query
      name: signature
      description: |
        HMAC-SHA256 signed URL for browser-safe access (e.g., img src).
        Requires both `signature` and `expires` query parameters.

security:
  - BearerAuth: []
