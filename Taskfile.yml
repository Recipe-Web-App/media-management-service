version: "3"

vars:
  BINARY_NAME: media-management-service

tasks:
  default:
    desc: Show available tasks
    cmds: [task --list]

  build:
    desc: Build the project
    cmds: [cargo build]
    sources: [src/**/*.rs, Cargo.toml, Cargo.lock]

  build:release:
    desc: Build optimized release binary
    cmds: [cargo build --release]

  run:
    desc: Run the service locally
    cmds: [cargo run]
    env:
      RUN_MODE: local
      RUST_LOG: debug

  test:
    desc: Run all tests
    cmds: [cargo test]

  test:unit:
    desc: Run unit tests only
    cmds: [cargo test --lib]

  test:integration:
    desc: Run integration tests only
    cmds: ["cargo test --test '*'"]

  lint:
    desc: Run all linters
    cmds:
      - cargo fmt --all -- --check
      - cargo clippy --all-targets -- -D warnings
      - cargo deny check

  fmt:
    desc: Format code
    cmds: [cargo fmt --all]

  check:
    desc: Quick compile check
    cmds: [cargo check]

  clean:
    desc: Clean build artifacts
    cmds: [cargo clean]

  coverage:
    desc: Generate HTML coverage report
    cmds: [cargo llvm-cov --html]

  docker:build:
    desc: Build Docker image
    cmds: ["docker build -t {{.BINARY_NAME}}:dev ."]

  docker:run:
    desc: Run Docker container locally
    deps: [docker:build]
    cmds:
      - "docker run --rm -p 3000:3000 --env-file .env.local {{.BINARY_NAME}}:dev"

  k8s:local:
    desc: Preview local k8s manifests
    cmds: [kustomize build k8s/overlays/local]

  k8s:prod:
    desc: Preview production k8s manifests
    cmds: [kustomize build k8s/overlays/prod]

  k8s:deploy:
    desc: Deploy to local Kubernetes (Minikube)
    cmds: ["bash scripts/containerManagement/deploy-container.sh {{.CLI_ARGS}}"]

  k8s:update:
    desc: Rebuild and update deployment
    cmds: ["bash scripts/containerManagement/update-container.sh {{.CLI_ARGS}}"]

  k8s:stop:
    desc: Stop (scale to 0) the deployment
    cmds: [bash scripts/containerManagement/stop-container.sh]

  k8s:start:
    desc: Start (scale up) the deployment
    cmds: [bash scripts/containerManagement/start-container.sh]

  k8s:cleanup:
    desc: Remove all Kubernetes resources
    cmds:
      ["bash scripts/containerManagement/cleanup-container.sh {{.CLI_ARGS}}"]

  k8s:status:
    desc: Show deployment status dashboard
    cmds: [bash scripts/containerManagement/get-container-status.sh]

  setup:
    desc: Install development dependencies
    cmds:
      - rustup component add llvm-tools-preview
      - cargo install cargo-llvm-cov cargo-deny lefthook
      - lefthook install
